<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MangaShift AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="wrap">
    <header class="top">
      <h1>MangaShift AI</h1>
      <span id="serverState" class="badge pending">Checking...</span>
    </header>

    <section class="group">
      <label class="row">
        <span>Enable on this site</span>
        <input id="enabledToggle" type="checkbox" />
      </label>
      <label class="row">
        <span>Auto enhance while scrolling</span>
        <input id="autoToggle" type="checkbox" />
      </label>
      <label class="row">
        <span>Remember style for this series</span>
        <input id="rememberToggle" type="checkbox" />
      </label>
    </section>

    <section class="group">
      <label for="sourceLang">Source language</label>
      <select id="sourceLang">
        <option value="auto">Auto detect</option>
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
      </select>
    </section>

    <section class="group">
      <label class="row">
        <span>Colorize grayscale pages</span>
        <input id="colorizeToggle" type="checkbox" />
      </label>
      <label for="upscaleRange">Upscale (<span id="upscaleValue">1.0</span>x)</label>
      <input id="upscaleRange" type="range" min="1" max="4" step="0.5" value="1" />
    </section>

    <section class="group">
      <h2>Style presets</h2>
      <div id="styleGrid" class="grid"></div>
    </section>

    <footer class="actions">
      <button id="applyBtn" class="primary">Apply to current tab</button>
      <button id="clearSeriesBtn">Clear series style</button>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
