name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (CI subset)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt flake8

      - name: Python lint
        run: flake8 backend/app backend/scripts tests

      - name: Run tests
        run: pytest tests -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: JS lint
        working-directory: extension
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: mangashift-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
